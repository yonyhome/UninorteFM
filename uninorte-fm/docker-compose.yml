version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uninorte-fm-pwa
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: uninorte-fm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
