server {
    listen 80;
    server_name uninortefm.uninorte.edu.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name uninortefm.uninorte.edu.co;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # PWA mandatory headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "autoplay=(self)";

    # Service Worker — must be served from root
    location /sw.js {
        proxy_pass http://app:3000/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest
    location /manifest.json {
        proxy_pass http://app:3000/manifest.json;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://app:3000/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /icons/ {
        proxy_pass http://app:3000/icons/;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
